name: Deploy Web (preview)

on:
  push:
    branches: [preview]
  workflow_dispatch:

concurrency:
  group: deploy-web-preview
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to preview
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PREV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          deployment_environment: "preview"
          app_location: "./"
          api_location: ""
          app_build_command: "npm run build:web"
          output_location: "apps/web/dist"
