name: Deploy Web (production)

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v7
        with:
          # Deploy the exact release tag. On workflow_dispatch, select a tag as
          # the ref (github.ref) so it still matches the environment's v* rule.
          ref: ${{ github.event.release.tag_name || github.ref }}
          submodules: true
          lfs: false
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # No deployment_environment => defaults to the production environment.
          app_location: "./"
          api_location: ""
          app_build_command: "npm run build:web"
          output_location: "apps/web/dist"
