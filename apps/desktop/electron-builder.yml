appId: com.codewally.pianel
productName: Pianel
directories:
  buildResources: build
  output: release/${version}
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron/*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
mac:
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.music
  hardenedRuntime: false
  extendInfo:
    NSBluetoothAlwaysUsageDescription: Pianel uses Bluetooth to communicate with your Roland piano.
    NSBluetoothPeripheralUsageDescription: Pianel uses Bluetooth to communicate with your Roland piano.
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # Drop a build/icon.ico (256x256+) here to brand the Windows build;
  # without it, electron-builder falls back to the default Electron icon.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Pianel
